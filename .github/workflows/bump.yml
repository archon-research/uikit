name: bump

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Read Node version from package.json
        id: node-version
        run: echo "value=$(jq -r '.volta.node // empty' package.json)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ steps.node-version.outputs.value }}
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@archon-research'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.UIKIT_GH_PACKAGES_READ_TOKEN }}
        run: npm exec semantic-release

      - name: Trigger publish workflow
        if: steps.release.outputs.release_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish.yml -f release_tag="release-${{ steps.release.outputs.release_version }}"

      - name: Open version-bump pull request
        if: steps.release.outputs.release_version != ''
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: 'chore(release): ${{ steps.release.outputs.release_version }}'
          branch: chore/release-bump
          delete-branch: true
          title: 'chore(release): ${{ steps.release.outputs.release_version }}'
          body: ${{ steps.release.outputs.release_notes }}
          sign-commits: true
