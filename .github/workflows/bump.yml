name: bump

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  packages: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm exec semantic-release

      - name: Trigger publish workflow
        if: steps.release.outputs.release_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          gh workflow run publish.yml --ref "$WORKFLOW_REF" -f release_tag="release-${{ steps.release.outputs.release_version }}"

      - name: No release generated
        if: steps.release.outputs.release_version == ''
        run: echo "semantic-release did not create a new version; publish workflow not triggered."
