name: bump

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read Node version from package.json
        id: node-version
        run: echo "value=$(jq -r '.volta.node // empty' package.json)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.node-version.outputs.value }}
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@archon-research'

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run release:check

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Apply changesets version bumps
        run: npm run changeset:version

      - name: Commit and push version changes
        id: version-commit
        run: |
          git add .
          git commit -m "chore: version packages"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Pack workspace packages
        run: |
          mkdir -p dist-pack
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              tarball=$(npm pack "$pkg" --pack-destination dist-pack --json | jq -r '.[0].filename')
              echo "Packed: $tarball"
            fi
          done

      - name: Read release tag from bumped package versions
        id: release-tag
        run: |
          versions=$(node -e "
            const fs = require('fs');
            const pkgs = fs.readdirSync('packages');
            const parts = pkgs.flatMap(p => {
              try {
                const { name, version } = JSON.parse(fs.readFileSync('packages/' + p + '/package.json', 'utf8'));
                const short = name.replace('@archon-research/', '');
                return [short + '@' + version];
              } catch { return []; }
            });
            console.log(parts.join(', '));
          ")
          echo "Versions: $versions"
          # Use the date + short sha as the tag for the draft release
          tag="release-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "value=$tag" >> "$GITHUB_OUTPUT"
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

      - name: Create draft release with tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release-tag.outputs.value }}" \
            --title "Release: ${{ steps.release-tag.outputs.versions }}" \
            --notes "Bumped packages: ${{ steps.release-tag.outputs.versions }}" \
            --draft \
            --target "${{ steps.version-commit.outputs.sha }}" \
            dist-pack/*.tgz
