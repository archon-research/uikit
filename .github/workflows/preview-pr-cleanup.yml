name: preview-pr-cleanup

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-branch-mutations
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Remove PR preview path from gh-pages
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/cleanup-pr-preview.sh
