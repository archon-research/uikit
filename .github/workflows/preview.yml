name: preview

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  packages: read
  pull-requests: write

jobs:
  resolve-preview-context:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && (github.event.action != 'closed' || github.event.pull_request.merged == true))
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      cleanup_pr_number: ${{ steps.context.outputs.cleanup_pr_number }}
      comment_pr_number: ${{ steps.context.outputs.comment_pr_number }}
      publish_event_name: ${{ steps.context.outputs.publish_event_name }}
      publish_pr_number: ${{ steps.context.outputs.publish_pr_number }}
      publish_sha: ${{ steps.context.outputs.publish_sha }}
      should_run: ${{ steps.context.outputs.should_run }}
    steps:
      - name: Resolve preview context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          should_run=true

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$PR_ACTION" == "closed" && "$PR_MERGED" == "true" ]]; then
              checkout_ref="$MERGE_COMMIT_SHA"
              publish_event_name="push"
              publish_sha="$MERGE_COMMIT_SHA"
              cleanup_pr_number="$PR_NUMBER"
            else
              publish_pr_number="$PR_NUMBER"
              comment_pr_number="$PR_NUMBER"
            fi
          fi

          echo "should_run=${should_run:-true}" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${checkout_ref:-$SHA}" >> "$GITHUB_OUTPUT"
          echo "publish_event_name=${publish_event_name:-$EVENT_NAME}" >> "$GITHUB_OUTPUT"
          echo "publish_sha=${publish_sha:-$SHA}" >> "$GITHUB_OUTPUT"
          echo "publish_pr_number=${publish_pr_number:-}" >> "$GITHUB_OUTPUT"
          echo "cleanup_pr_number=${cleanup_pr_number:-}" >> "$GITHUB_OUTPUT"
          echo "comment_pr_number=${comment_pr_number:-}" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: resolve-preview-context
    if: needs.resolve-preview-context.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-branch-mutations
      cancel-in-progress: false
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-preview-context.outputs.checkout_ref }}

      - name: Read Node version from package.json
        id: node-version
        run: echo "value=$(jq -r '.volta.node // empty' package.json)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ steps.node-version.outputs.value }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview site
        run: npm run preview:build

      - name: Publish preview to gh-pages
        env:
          CLEANUP_PR_NUMBER: ${{ needs.resolve-preview-context.outputs.cleanup_pr_number }}
          EVENT_NAME: ${{ needs.resolve-preview-context.outputs.publish_event_name }}
          PR_NUMBER: ${{ needs.resolve-preview-context.outputs.publish_pr_number }}
          SHA: ${{ needs.resolve-preview-context.outputs.publish_sha }}
        run: bash .github/scripts/publish-preview.sh

      - name: Comment PR with preview links
        if: needs.resolve-preview-context.outputs.comment_pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.resolve-preview-context.outputs.comment_pr_number }}
          PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr/${{ needs.resolve-preview-context.outputs.comment_pr_number }}/
        run: |
          set -euo pipefail

          MARKER="<!-- uikit-preview-links -->"
          BODY=$(cat <<EOF
          ${MARKER}
          Preview is ready:

          - Preview: ${PREVIEW_URL}
          EOF
          )

          COMMENTS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments")
          EXISTING_ID=$(echo "$COMMENTS" | jq -r ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n 1)

          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
            gh api \
              "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              --method PATCH \
              -f body="$BODY" >/dev/null
          else
            gh api \
              "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              --method POST \
              -f body="$BODY" >/dev/null
          fi

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged != true
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-branch-mutations
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Remove PR preview path from gh-pages
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/cleanup-pr-preview.sh
