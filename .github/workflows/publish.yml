name: publish

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish (for example release-0.3.0-dev.1)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    if: ${{ (github.event_name == 'release' && github.event.release.draft == true) || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout metadata script only
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: .meta
          sparse-checkout: |
            .github/scripts/resolve-release-metadata.sh
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Resolve release metadata
        id: release-meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: bash .meta/.github/scripts/resolve-release-metadata.sh

      - name: Checkout publish ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.release-meta.outputs.checkout_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set workspace versions from release tag
        env:
          VERSION: ${{ steps.release-meta.outputs.version }}
        run: |
          npm version "$VERSION" --workspaces --no-git-tag-version

      - name: Prepare packages
        run: npm run prepare

      - name: Resolve workspace package names
        run: |
          {
            echo 'WORKSPACE_PACKAGES<<EOF'
            npm query ".workspace" | jq -r '.[].name'
            echo EOF
          } >> "$GITHUB_ENV"

      - name: Publish packages to GitHub Packages
        id: publish-gpr
        continue-on-error: true
        run: |
          cat > "$RUNNER_TEMP/npmrc-gpr" <<EOF
          @archon-research:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}
          EOF
          failed=0
          for pkg in $WORKSPACE_PACKAGES; do
            npm publish --workspace "$pkg" --userconfig "$RUNNER_TEMP/npmrc-gpr" || { echo "::warning::Failed to publish $pkg to GitHub Packages"; failed=1; }
          done
          exit $failed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_REGISTRY: https://npm.pkg.github.com
          NPM_CONFIG_SCOPE: '@archon-research'
          NPM_CONFIG_TAG: ${{ steps.release-meta.outputs.npm_tag }}

      - name: Switch workspace publish registry to npmjs
        if: always()
        run: npm pkg delete publishConfig.registry --workspaces

      - name: Publish packages to npmjs
        id: publish-npmjs
        if: always()
        continue-on-error: true
        run: |
          npm pkg set repository.url="https://github.com/${GITHUB_REPOSITORY}" --workspaces
          failed=0
          for pkg in $WORKSPACE_PACKAGES; do
            npm publish --workspace "$pkg" --provenance || { echo "::warning::Failed to publish $pkg to npmjs"; failed=1; }
          done
          exit $failed
        env:
          NPM_CONFIG_ACCESS: public
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPM_CONFIG_SCOPE: '@archon-research'
          NPM_CONFIG_TAG: ${{ steps.release-meta.outputs.npm_tag }}

      - name: Pack tarballs for release assets
        id: pack-tarballs
        if: always()
        continue-on-error: true
        run: |
          mkdir -p dist-pack
          for pkg in $WORKSPACE_PACKAGES; do
            npm pack --workspace "$pkg" --pack-destination dist-pack
          done

      - name: Check release publish status
        id: release-status
        if: always() && steps.release-meta.outputs.is_dev != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          is_draft="$(gh release view "${{ steps.release-meta.outputs.release_tag }}" --json isDraft --jq '.isDraft')"
          if [ "$is_draft" = "false" ]; then
            echo "release_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload tarballs to release
        id: upload-tarballs
        if: always() && steps.release-meta.outputs.is_dev != 'true' && steps.pack-tarballs.outcome == 'success' && steps.release-status.outputs.release_published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release-meta.outputs.release_tag }}" dist-pack/*.tgz --clobber

      - name: Mark release as published
        if: always() && steps.release-meta.outputs.is_dev != 'true' && steps.release-status.outputs.release_published != 'true' && steps.publish-gpr.outcome == 'success' && steps.publish-npmjs.outcome == 'success' && steps.upload-tarballs.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.release-meta.outputs.release_tag }}" --draft=false
