name: publish

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example release-1.2.3)
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: ${{ (github.event_name == 'release' && github.event.release.draft == true) || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Read Node version from package.json
        id: node-version
        run: echo "value=$(jq -r '.volta.node // empty' package.json)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ steps.node-version.outputs.value }}
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@archon-research'

      - name: Install dependencies
        run: npm ci

      - name: Prepare packages
        run: npm run prepare

      - name: Publish packages to GitHub Packages
        run: npm run publish:workspaces
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack tarballs for release assets
        run: |
          mkdir -p dist-pack
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              npm pack "$pkg" --pack-destination dist-pack
            fi
          done

      - name: Upload tarballs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" dist-pack/*.tgz --clobber

      - name: Mark release as published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ env.RELEASE_TAG }}" --draft=false
