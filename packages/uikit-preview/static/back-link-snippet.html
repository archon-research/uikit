<style id="uikit-preview-back-link-style">
  .uikit-preview-back-link {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 10000;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid #d0d7de;
    background: rgba(255, 255, 255, 0.96);
    color: #0f172a;
    font: 500 13px/1.2 ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-decoration: none;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
  }

  [data-theme='dark'] .uikit-preview-back-link {
    border-color: #334155;
    background: rgba(15, 23, 42, 0.9);
    color: #e2e8f0;
  }

  .uikit-preview-back-link:hover {
    background: #ffffff;
    border-color: #b8c2cc;
  }

  [data-theme='dark'] .uikit-preview-back-link:hover {
    background: rgba(30, 41, 59, 0.96);
    border-color: #475569;
  }
</style>
<script>
  (() => {
    const id = 'uikit-preview-back-link';
    const hrefMarkers = ['/stories/', '/studio/', '/tokens/'];

    const isLadle = () => window.location.pathname.includes('/stories');

    const forceLadleSidebarLeft = () => {
      const clearReversed = () => {
        document.documentElement.removeAttribute('data-reversed');
        if (document.body) {
          document.body.removeAttribute('data-reversed');
        }
      };

      clearReversed();

      const observer = new MutationObserver(clearReversed);
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-reversed'],
      });

      if (document.body) {
        observer.observe(document.body, {
          attributes: true,
          attributeFilter: ['data-reversed'],
        });
      }
    };

    const getHref = () => {
      const path = window.location.pathname;

      for (const marker of hrefMarkers) {
        const markerIndex = path.indexOf(marker);
        if (markerIndex >= 0) {
          return path.slice(0, markerIndex + 1);
        }
      }

      const suffixes = ['/stories', '/studio', '/tokens'];
      for (const suffix of suffixes) {
        if (path.endsWith(suffix)) {
          return path.slice(0, -suffix.length + 1);
        }
      }

      return '/';
    };

    const mount = () => {
      if (!document.body || document.getElementById(id)) return;

      const link = document.createElement('a');
      link.id = id;
      link.className = 'uikit-preview-back-link';
      link.setAttribute('data-uikit-preview-back-link', 'true');
      link.href = getHref();
      link.textContent = 'Back to preview home';
      document.body.appendChild(link);
    };

    if (isLadle()) {
      forceLadleSidebarLeft();
    }

    if (document.readyState === 'loading') {
      document.addEventListener(
        'DOMContentLoaded',
        () => {
          mount();
        },
        { once: true },
      );
    } else {
      mount();
    }
  })();
</script>
