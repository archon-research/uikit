<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIKit Token Mapping</title>
    <style>
      :root {
        --bg: #f7fbff;
        --ink: #182026;
        --panel: #ffffff;
        --line: #dce9f4;
        --accent: #0557d9;
      }

      body {
        margin: 0;
        padding: 32px 16px;
        background: var(--bg);
        color: var(--ink);
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin-top: 0;
      }

      .top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      a {
        color: var(--accent);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: var(--panel);
      }

      th,
      td {
        border: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
        padding: 10px;
      }

      .chip {
        display: inline-block;
        border: 1px solid #c6d6e6;
        border-radius: 999px;
        padding: 2px 10px;
        margin: 2px 6px 2px 0;
        font-size: 0.85rem;
        background: #f1f7ff;
      }

      .muted {
        color: #5d6d7a;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top">
        <h1>Component Token Mapping</h1>
        <a href="../">Back to preview home</a>
      </div>

      <p class="muted">
        Curated v1 mapping from design-system recipes to token usage. Start with
        Switch and extend over time for additional components.
      </p>

      <table aria-label="Token mapping table">
        <thead>
          <tr>
            <th>Component</th>
            <th>Recipe/Source</th>
            <th>Token References</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </main>

    <script>
      const table = document.getElementById('rows');

      const chip = (token) => `<span class="chip">${token}</span>`;

      fetch('./mapping.json')
        .then((res) => res.json())
        .then((items) => {
          table.innerHTML = items
            .map(
              (item) => `
                <tr>
                  <td>${item.component}</td>
                  <td><a href="${item.sourceHref}">${item.sourceLabel}</a></td>
                  <td>${item.tokens.map(chip).join('')}</td>
                  <td>${item.status}</td>
                </tr>
              `,
            )
            .join('');
        })
        .catch(() => {
          table.innerHTML =
            '<tr><td colspan="4">Unable to load mapping data.</td></tr>';
        });
    </script>
  </body>
</html>
