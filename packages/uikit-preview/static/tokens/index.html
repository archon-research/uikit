<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIKit Panda Spec</title>
    <script>
      (() => {
        const readThemeMode = () => {
          const stored = window.localStorage.getItem('theme');
          const legacyStored = window.localStorage.getItem('archon-theme');
          const studioStored = window.localStorage.getItem('panda:studio:theme');
          const value = stored || legacyStored || studioStored;

          if (value === 'light' || value === 'dark' || value === 'auto') {
            return value;
          }

          return 'auto';
        };

        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const mode = readThemeMode();
        const effectiveTheme = mode === 'auto' ? (prefersDark ? 'dark' : 'light') : mode;

        document.documentElement.dataset.theme = effectiveTheme;
        document.documentElement.classList.toggle('dark', effectiveTheme === 'dark');
      })();
    </script>
    <link rel="stylesheet" href="../design-system.css" />
    <link rel="stylesheet" href="../preview.css" />
    <style>
      main {
        width: min(1040px, 94vw);
        margin: 0 auto;
        padding: 48px 0 72px;
      }

      h1 {
        font-size: var(--font-sizes-3xl);
      }

      .back-link {
        display: inline-block;
        margin-top: 8px;
        color: var(--colors-slate-700);
      }

      :root[data-theme='dark'] .back-link {
        color: var(--colors-slate-300);
      }

      p {
        margin: 16px 0 0;
      }

      .table-wrap {
        margin-top: 20px;
        border: 1px solid var(--colors-slate-300);
        border-radius: var(--radii-lg);
        overflow: auto;
        background: var(--colors-white);
      }

      :root[data-theme='dark'] .table-wrap {
        border-color: var(--colors-slate-700);
        background: var(--colors-slate-900);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 12px 14px;
        border-bottom: 1px solid var(--colors-slate-200);
        vertical-align: top;
      }

      th {
        font-size: var(--font-sizes-sm);
        font-weight: var(--font-weights-semibold);
        color: var(--colors-slate-700);
        background: var(--colors-slate-100);
      }

      :root[data-theme='dark'] th {
        color: var(--colors-slate-300);
        background: var(--colors-slate-800);
      }

      td {
        font-size: var(--font-sizes-sm);
      }

      :root[data-theme='dark'] th,
      :root[data-theme='dark'] td {
        border-bottom-color: var(--colors-slate-700);
      }

      :root[data-theme='dark'] td {
        color: var(--colors-slate-100);
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      a {
        color: var(--colors-blue-700);
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Panda Spec</h1>
        <a class="back-link" href="../">Back to preview home</a>
      </div>

      <p>
        Generated documentation view sourced from Panda Spec JSON output. This
        page is generated from the shared design-system Panda configuration.
      </p>

      <div class="table-wrap">
        <table aria-label="Panda spec table">
          <thead>
            <tr>
              <th>Spec File</th>
              <th>Type</th>
              <th>Entries</th>
              <th>Sample</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>

    <script>
      const table = document.getElementById('rows');
      const specFiles = [
        'tokens.json',
        'semantic-tokens.json',
        'recipes.json',
        'patterns.json',
        'conditions.json',
        'text-styles.json',
        'layer-styles.json',
        'animation-styles.json',
        'keyframes.json',
        'color-palette.json',
      ];

      const getName = (item) => {
        if (!item || typeof item !== 'object') return '';
        if (typeof item.name === 'string') return item.name;
        if (typeof item.type === 'string') return item.type;
        return '';
      };

      Promise.all(
        specFiles.map(async (fileName) => {
          const response = await fetch(`./spec/${fileName}`);
          if (!response.ok) {
            throw new Error(fileName);
          }

          const spec = await response.json();
          const entries = Array.isArray(spec.data) ? spec.data : [];
          const sample = entries
            .slice(0, 3)
            .map(getName)
            .filter(Boolean)
            .join(', ');

          return {
            fileName,
            type: spec.type || 'unknown',
            count: entries.length,
            sample: sample || 'No named entries',
          };
        }),
      )
        .then((rows) => {
          table.innerHTML = rows
            .map(
              (row) => `
                <tr>
                  <td><a href="./spec/${row.fileName}">${row.fileName}</a></td>
                  <td>${row.type}</td>
                  <td>${row.count}</td>
                  <td>${row.sample}</td>
                </tr>
              `,
            )
            .join('');
        })
        .catch(() => {
          table.innerHTML =
            '<tr><td colspan="4">Unable to load Panda spec data.</td></tr>';
        });
    </script>
  </body>
</html>
