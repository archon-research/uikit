<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UIKit Token Mapping</title>
    <link rel="stylesheet" href="../design-system.css" />
  </head>
  <body>
    <main>
      <div>
        <h1>Component Token Mapping</h1>
        <a href="../">Back to preview home</a>
      </div>

      <p>
        Curated v1 mapping from design-system recipes to token usage. Start with
        Switch and extend over time for additional components.
      </p>

      <table aria-label="Token mapping table">
        <thead>
          <tr>
            <th>Component</th>
            <th>Recipe/Source</th>
            <th>Token References</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </main>

    <script>
      const table = document.getElementById('rows');

      fetch('./mapping.json')
        .then((res) => res.json())
        .then((items) => {
          table.innerHTML = items
            .map(
              (item) => `
                <tr>
                  <td>${item.component}</td>
                  <td><a href="${item.sourceHref}">${item.sourceLabel}</a></td>
                  <td>${item.tokens.join(', ') || 'None yet'}</td>
                  <td>${item.status}</td>
                </tr>
              `,
            )
            .join('');
        })
        .catch(() => {
          table.innerHTML =
            '<tr><td colspan="4">Unable to load mapping data.</td></tr>';
        });
    </script>
  </body>
</html>
