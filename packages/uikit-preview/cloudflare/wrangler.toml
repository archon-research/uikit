name = "mcp-relay"
main = "worker.ts"
compatibility_date = "2025-06-16"
compatibility_flags = ["nodejs_compat"]

# Local dev: set WEBMCP_RELAY_JWT_SECRET in .dev.vars (see .dev.vars.example).
# Production: wrangler secret put WEBMCP_RELAY_JWT_SECRET

[[durable_objects.bindings]]
name = "SESSION_DO"
class_name = "SessionDO"

# SQLite-backed Durable Objects: free-tier eligible and the modern default.
# SessionDO uses only the hibernation WebSocket API + storage alarms, all
# supported by SQLite-backed DOs.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]
