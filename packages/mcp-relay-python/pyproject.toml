[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "webmcp-relay"
version = "0.1.0"
description = "Generic WebMCP relay: sessions, stateless-JWT auth, WS back-channel, tool-call routing, mutation-confirmation protocol"
readme = "README.md"
requires-python = ">=3.11"
authors = [{name = "Archon Research", email = "dev@archon.ai"}]
license = {text = "MIT"}
dependencies = [
    "fastapi>=0.115.0",
    "pydantic>=2.0.0",
    "python-jose[cryptography]>=3.3.0",
    "fastmcp>=2.0.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.0",
    "httpx>=0.27.0",
    "ruff>=0.15",
    "ty>=0.0.16",
]

[tool.hatch.build.targets.wheel]
packages = ["src/webmcp_relay"]

# Pytest configuration
[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

# Ruff - mirror the root repo conventions with one carve-out: os.environ is
# permitted in webmcp_relay.tokens because the package has no host config module.
[tool.ruff]
target-version = "py311"
line-length = 100
preview = true
exclude = ["__pycache__", ".git", "*.egg-info", "build", "dist", ".venv"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "N",
    "UP",
    "B",
    "A",
    "C4",
    "T20",
    "SIM",
    "ARG",
    "PTH",
    "PGH004",
]
ignore = ["E402", "E501"]
fixable = ["ALL"]

[tool.ruff.lint.isort]
known-first-party = ["webmcp_relay"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# ty - type checking
[tool.ty.src]
exclude = ["__pycache__", ".venv", "dist", "build"]
